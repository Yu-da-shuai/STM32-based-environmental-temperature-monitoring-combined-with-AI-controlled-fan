<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>环境监测系统</title>
    <style>
        /* 页面整体布局 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* 卡片样式 */
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 320px;
            text-align: center;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h2 {
            color: #333;
            margin-bottom: 2rem;
            font-size: 1.8rem;
        }

        /* 数据行样式 */
        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
            padding: 15px 20px;
            background: #f8f9fa;
            border-radius: 12px;
            border: 1px solid #eee;
        }

        .label {
            font-weight: 600;
            color: #666;
            display: flex;
            align-items: center;
            font-size: 1.1rem;
        }

        .icon {
            margin-right: 10px;
        }

        .value {
            font-size: 1.4rem;
            font-weight: bold;
            color: #007bff;
        }

        /* 状态指示灯区域 */
        .status-container {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 2px dashed #eee;
            font-size: 0.95rem;
            color: #555;
        }

        .dot {
            height: 12px;
            width: 12px;
            background-color: #ccc;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            vertical-align: middle;
        }

        .online {
            background-color: #28a745;
            box-shadow: 0 0 8px rgba(40, 167, 69, 0.6);
        }

        .offline {
            background-color: #dc3545;
            box-shadow: 0 0 8px rgba(220, 53, 69, 0.6);
        }

        .time-log {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>监测面板</h2>

    <div class="data-row">
        <span class="label"><span class="icon">🌡️</span>温度</span>
        <span class="value" id="temp">-- °C</span>
    </div>

    <div class="data-row">
        <span class="label"><span class="icon">💧</span>湿度</span>
        <span class="value" id="hum">-- %</span>
    </div>

    <div class="status-container">
        硬件状态:
        <span class="dot" id="status-dot"></span>
        <span id="status-text">连接中...</span>

        <div class="time-log" id="time-log">等待服务器响应...</div>
    </div>
</div>

<script>
    // ==============================================================
    // 【关键修改】这里填你 Python 运行的 IP 和 端口 (根据你的截图是 8080)
    // 如果是在同一台电脑打开网页，也可以填 http://127.0.0.1:8080/data
    // ==============================================================
    const SERVER_URL = "http://127.0.0.1:8080/data";

    async function updateData() {
        try {
            // 1. 向 Python 服务器请求数据
            const response = await fetch(SERVER_URL);

            // 如果网络不通
            if (!response.ok) throw new Error("服务器未响应");

            // 2. 解析 JSON 数据 (Python 已经把乱码处理好了，这里拿到的就是标准 JSON)
            const data = await response.json();

            // 3. 更新界面数值
            document.getElementById("temp").innerText = data.temperature + " °C";
            document.getElementById("hum").innerText = data.humidity + " %";

            // 4. 更新状态灯逻辑
            const dot = document.getElementById("status-dot");
            const txt = document.getElementById("status-text");

            if (data.status === "online") {
                // 如果 Python 成功读到了串口数据
                dot.className = "dot online";
                txt.innerText = "设备在线";
                txt.style.color = "#28a745";
            } else {
                // 如果 Python 运行着，但串口没数据
                dot.className = "dot offline";
                txt.innerText = "等待硬件数据";
                txt.style.color = "#e6a23c"; // 橙色
            }

            document.getElementById("time-log").innerText = "最后更新: " + new Date().toLocaleTimeString();

        } catch (error) {
            // 5. 如果连不上 Python 服务器 (Python 没运行，或者 IP 填错了)
            console.error(error);
            document.getElementById("status-dot").className = "dot offline";
            document.getElementById("status-text").innerText = "服务器断连";
            document.getElementById("status-text").style.color = "#dc3545"; // 红色
            document.getElementById("time-log").innerText = "请检查 main.py 是否运行";
        }
    }

    // 设置定时器：每 1.5 秒刷新一次
    setInterval(updateData, 1500);

    // 页面加载完立即执行一次
    updateData();
</script>

</body>
</html>
